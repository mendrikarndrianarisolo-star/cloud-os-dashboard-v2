<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Cloud OS</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0a0a0f; --bg2: rgba(255,255,255,0.03); --bg3: rgba(255,255,255,0.06);
      --txt: #e4e4e7; --txt2: #a1a1aa; --txt3: #71717a;
      --border: rgba(255,255,255,0.06); --accent: #f38020;
      --ok: #22c55e; --warn: #f59e0b; --danger: #ef4444;
    }
    [data-theme="light"] {
      --bg: #f5f5f7; --bg2: rgba(0,0,0,0.03); --bg3: rgba(0,0,0,0.06);
      --txt: #18181b; --txt2: #52525b; --txt3: #71717a;
      --border: rgba(0,0,0,0.08); --accent: #f38020;
      --ok: #16a34a; --warn: #d97706; --danger: #dc2626;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--txt); overflow: hidden; touch-action: manipulation;
    }
    #root { width: 100vw; height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--txt3); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
